[project]
name = "aether-sdk"
version = "0.1.0.dev0"
description = "Aether Platform SDK — contracts for game providers, plugins and extensions"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aether_sdk"]
