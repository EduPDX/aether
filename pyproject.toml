[tool.uv.workspace]
members = ["apps/core", "apps/cli", "packages/sdk", "providers/minecraft"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "httpx>=0.27",
    "ruff>=0.8",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.pytest.ini_options]
testpaths = ["apps", "packages", "providers"]
addopts = "-q"
